// ============================================================
// SOUND
// ============================================================
var audioCtx = null;
var musicOn = true;
var musicTimers = [];

function getAC() {
if (!audioCtx) {
audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
if (audioCtx.state === “suspended”) audioCtx.resume();
return audioCtx;
}

function playNote(freq, type, startOff, dur, vol) {
vol = vol || 0.25;
var ctx = getAC();
var osc = ctx.createOscillator();
var gain = ctx.createGain();
osc.connect(gain);
gain.connect(ctx.destination);
osc.type = type;
osc.frequency.setValueAtTime(freq, ctx.currentTime + startOff);
gain.gain.setValueAtTime(0, ctx.currentTime + startOff);
gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startOff + 0.02);
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startOff + dur);
osc.start(ctx.currentTime + startOff);
osc.stop(ctx.currentTime + startOff + dur + 0.05);
}

function sfxAnswer() { playNote(880,“sine”,0,.15,.2); playNote(1108,“sine”,.08,.14,.16); }
function sfxVote() { playNote(660,“triangle”,0,.1,.18); playNote(990,“triangle”,.05,.1,.14); }
function sfxCheer() { [523,659,784,1047].forEach(function(f,i){ playNote(f,“triangle”,i*.06,.25,.18); }); }
function sfxDrum() { for(var i=0;i<12;i++) playNote(110+i*7,“square”,i*.06,.06,.12); }
function sfxFanfare() { [523,659,784,1047,1319].forEach(function(f,i){ playNote(f,“triangle”,i*.09,.4,.24); playNote(f*2,“sine”,i*.09+.04,.2,.1); }); }
function sfxPop() { playNote(440,“square”,0,.06,.14); playNote(880,“square”,.04,.05,.11); }
function sfxWhoosh() { for(var i=0;i<8;i++) playNote(200-i*14,“sine”,i*.03,.08,.09); }

function startMusic() {
if (!musicOn) return;
stopMusic();
var melody = [523,659,784,659,523,659,784,1047,784,659,523,659];
var bpm = 88;
var bd = 60/bpm*0.5;
function loop() {
if (!musicOn) return;
melody.forEach(function(f,i) {
var ctx = getAC();
var osc = ctx.createOscillator();
var g = ctx.createGain();
osc.connect(g); g.connect(ctx.destination);
osc.type = “sine”;
osc.frequency.setValueAtTime(f, ctx.currentTime+i*bd);
g.gain.setValueAtTime(0, ctx.currentTime+i*bd);
g.gain.linearRampToValueAtTime(0.035, ctx.currentTime+i*bd+0.04);
g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*bd+bd*0.88);
osc.start(ctx.currentTime+i*bd);
osc.stop(ctx.currentTime+i*bd+bd);
});
var t = setTimeout(loop, melody.length*bd*1000);
musicTimers.push(t);
}
loop();
}

function stopMusic() {
musicTimers.forEach(function(t){ clearTimeout(t); });
musicTimers = [];
}

function shuffle(arr) {
var a = arr.slice();
for (var i=a.length-1;i>0;i–) {
var j = Math.floor(Math.random()*(i+1));
var tmp = a[i]; a[i]=a[j]; a[j]=tmp;
}
return a;
}

function uid() {
var chars = “ABCDEFGHJKLMNPQRSTUVWXYZ23456789”;
var result = “”;
for (var i=0;i<6;i++) result += chars[Math.floor(Math.random()*chars.length)];
return result;
}

config: {iceServers:[
{urls:“stun:stun.l.google.com:19302”},
{urls:“stun:stun1.l.google.com:19302”}
]}
});
this.peer.on(“open”, function() { render(); });
this.peer.on(“connection”, function(conn) { self.onConn(conn); });
this.peer.on(“error”, function(e) { console.error(“peer error”,e); render(); });
};

HostGame.prototype.onConn = function(conn) {
var self = this;
this.conns[conn.peer] = conn;
conn.on(“open”, function() {
conn.send({type:“state”, scene:self.scene, players:self.pubPlayers()});
});
conn.on(“data”, function(d) { self.onMsg(conn, d); });
conn.on(“close”, function() {
delete self.conns[conn.peer];
if (self.players[conn.peer]) self.players[conn.peer].connected = false;
render();
});
conn.on(“error”, function(e){ console.error(“conn error”,e); });
};

HostGame.prototype.pubPlayers = function() {
var out = {};
Object.keys(this.players).forEach(function(id) {
var p = this.players[id];
out[id] = {id:id, name:p.name, character:p.character, score:p.score, connected:p.connected, colorIdx:p.colorIdx};
}, this);
return out;
};

HostGame.prototype.onMsg = function(conn, data) {
if (!data || !data.type) return;
var pid = conn.peer;
var self = this;

if (data.type === “join”) {
var name = sanitize(data.name);
var char = data.character;
if (!name || !char || !CHARS[char]) { conn.send({type:“joinError”,reason:“Invalid name or character”}); return; }
var taken = Object.values(this.players).some(function(p){ return p.character===char && p.connected; });
if (taken) { conn.send({type:“joinError”,reason:“That character is taken! Pick another.”}); return; }
this.players[pid] = {id:pid, name:name, character:char, score:0, connected:true, colorIdx:this.colorCounter++};
conn.send({type:“joined”, playerId:pid});
this.broadcast({type:“players”, players:this.pubPlayers()});
render();
return;
}

if (data.type === “answer”) {
if (this.scene !== “answer”) return;
this.responses[pid] = sanitize(data.answer);
conn.send({type:“answerOk”});
this.broadcastStatus();
var expected = this.getExpected();
var allDone = expected.every(function(id){ return self.responses[id] !== undefined; });
if (allDone) this.endAnswer();
render();
return;
}

if (data.type === “vote”) {
if (this.scene !== “vote”) return;
this.votes[pid] = data.idx;
conn.send({type:“voteOk”});
var voters = this.getVoters();
var allVoted = voters.every(function(id){ return self.votes[id] !== undefined; });
if (allVoted) this.endVote();
render();
return;
}
};

HostGame.prototype.broadcast = function(msg) {
Object.values(this.conns).forEach(function(c){ try{ c.send(msg); }catch(e){} });
};

HostGame.prototype.broadcastStatus = function() {
var self = this;
Object.keys(this.conns).forEach(function(pid) {
try { self.conns[pid].send({type:“answerStatus”, answered:!!self.responses[pid]}); } catch(e){}
});
};

HostGame.prototype.getExpected = function() {
var type = this.currentRound ? this.currentRound.type : “”;
var ids = Object.keys(this.players).filter(function(id){ return this.players[id].connected; }, this);
if (type === “lie”) return this.subjectId ? [this.subjectId] : [];
if (type === “vibe” || type === “dating”) return ids.filter(function(id){ return id !== this.subjectId; }, this);
return ids;
};

HostGame.prototype.getVoters = function() {
return Object.keys(this.players).filter(function(id){ return this.players[id].connected; }, this);
};

HostGame.prototype.pickQ = function(type) {
if (!this.usedQs[type]) this.usedQs[type] = [];
var pool = getQPool(type);
var unused = pool.filter(function(q){ return this.usedQs[type].indexOf(q) < 0; }, this);
if (unused.length === 0) { this.usedQs[type] = []; unused = pool.slice(); }
var q = unused[Math.floor(Math.random()*unused.length)];
this.usedQs[type].push(q);
return q;
};

HostGame.prototype.startGame = function() {
var ids = Object.keys(this.players);
if (ids.length < 2) return;
ids.forEach(function(id){ this.players[id].score = 0; }, this);
this.lieRoster = shuffle(ids);
this.roundIdx = 0;
startMusic();
this.startRound();
};

HostGame.prototype.startRound = function() {
if (this.roundIdx >= this.roundOrder.length) { this.endGame(); return; }
var type = this.roundOrder[this.roundIdx];
this.responses = {};
this.votes = {};
this.voteCounts = {};
this.subjectId = null;
this.shuffledAnswers = [];
this.revealIdx = 0;

var ids = Object.keys(this.players).filter(function(id){ return this.players[id].connected; }, this);

if (type === “lie”) {
if (this.lieRoster.length === 0) this.lieRoster = shuffle(ids);
this.subjectId = this.lieRoster.shift();
while (this.subjectId && !this.players[this.subjectId].connected && this.lieRoster.length > 0) {
this.subjectId = this.lieRoster.shift();
}
}
if (type === “vibe” || type === “dating”) {
this.subjectId = ids[Math.floor(Math.random()*ids.length)];
}

var q = this.pickQ(type);
var subjectName = this.subjectId && this.players[this.subjectId] ? this.players[this.subjectId].name : “”;
var qText = q.replace(/{name}/g, subjectName);

this.currentRound = {type:type, label:ROUND_LABELS[type], question:qText, qTemplate:q};
this.scene = “answer”;
this.timeLeft = type === “lie” ? 90 : 60;
this.startTimer(this.endAnswer.bind(this));

var self = this;
var expected = this.getExpected();
Object.keys(this.conns).forEach(function(pid) {
var isAnswerer = expected.indexOf(pid) >= 0;
var pq = qText;
if (type === “lie”) {
if (pid === self.subjectId) pq = “You are in the hot seat! Write 2 TRUE things and 1 LIE about yourself. Put each on a new line.”;
else pq = subjectName + “ is about to confess… wait for the reveal then vote on which statement is the LIE!”;
} else if ((type === “vibe” || type === “dating”) && pid === self.subjectId) {
pq = “Sit back - everyone is writing about YOU this round!”;
}
try {
self.conns[pid].send({
type:“roundStart”, roundType:type, label:ROUND_LABELS[type],
question:pq, isAnswerer:isAnswerer,
subjectId:self.subjectId, subjectName:subjectName, timeLeft:self.timeLeft
});
} catch(e){}
});

sfxWhoosh();
render();
};

HostGame.prototype.startTimer = function(cb) {
var self = this;
if (this.timer) clearInterval(this.timer);
this.timer = setInterval(function() {
if (self.paused) return;
self.timeLeft–;
if (self.timeLeft > 0 && self.timeLeft <= 5) sfxPop();
if (self.timeLeft <= 0) {
clearInterval(self.timer); self.timer = null;
cb();
}
render();
}, 1000);
};

HostGame.prototype.pauseToggle = function() { this.paused = !this.paused; render(); };

HostGame.prototype.endAnswer = function() {
if (this.timer) { clearInterval(this.timer); this.timer = null; }
sfxPop();

var type = this.currentRound.type;
var self = this;

if (type === “lie”) {
var raw = this.responses[this.subjectId] || “”;
var stmts = raw.split(”\n”).map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; }).slice(0,3);
while (stmts.length < 3) stmts.push(”(no answer)”);
this.shuffledAnswers = stmts.map(function(s,i){ return {playerId:self.subjectId, text:s, idx:i, votes:0}; });
} else {
Object.keys(this.responses).forEach(function(pid) {
if (self.players[pid]) self.players[pid].score += 200;
});
var entries = Object.keys(this.responses).map(function(pid){ return {playerId:pid, text:self.responses[pid], votes:0}; });
this.shuffledAnswers = shuffle(entries);
}

if (this.shuffledAnswers.length === 0) {
this.roundIdx++;
var self2 = this;
setTimeout(function(){ self2.startRound(); }, 1500);
return;
}

this.scene = “vote”;
this.timeLeft = 30;
this.startTimer(this.endVote.bind(this));

var voters = this.getVoters();
var subjectId = this.subjectId;
var roundType = type;
var opts = this.shuffledAnswers.map(function(a,i){ return {i:i, text:a.text}; });

Object.keys(this.conns).forEach(function(pid) {
var canVote = voters.indexOf(pid) >= 0;
if (roundType === “lie” && pid === subjectId) canVote = false;
var myOpts = opts.map(function(o){ return {i:o.i, text:o.text, isOwn: self.shuffledAnswers[o.i].playerId === pid}; });
try {
self.conns[pid].send({type:“votePhase”, roundType:roundType, question:self.currentRound.question, options:myOpts, canVote:canVote});
} catch(e){}
});

render();
};

HostGame.prototype.endVote = function() {
if (this.timer) { clearInterval(this.timer); this.timer = null; }
sfxDrum();

var vcounts = {};
var self = this;
Object.values(this.votes).forEach(function(idx) {
vcounts[idx] = (vcounts[idx]||0) + 1;
});

var totalVoters = this.getVoters().length;
if (this.currentRound.type === “lie”) totalVoters = Math.max(1, totalVoters - 1);

this.shuffledAnswers.forEach(function(a, i) {
a.votes = vcounts[i] || 0;
if (self.currentRound.type !== “lie”) {
a.points = a.votes * 500 + (a.votes >= 2 && a.votes === totalVoters ? 1000 : 0);
if (self.players[a.playerId]) self.players[a.playerId].score += a.points;
} else {
a.points = a.votes * 300;
}
});

this.scene = “reveal”;
this.revealIdx = 0;
this.broadcast({type:“watching”});
render();
};

HostGame.prototype.nextReveal = function() {
this.revealIdx++;
sfxCheer();
if (this.revealIdx >= this.shuffledAnswers.length) {
// auto advance to leaderboard
}
render();
};

HostGame.prototype.goLeaderboard = function() {
this.scene = “leaderboard”;
sfxFanfare();
this.broadcast({type:“leaderboard”});
render();
};

HostGame.prototype.nextRound = function() {
this.roundIdx++;
if (this.roundIdx >= this.roundOrder.length) this.endGame();
else this.startRound();
};

HostGame.prototype.endGame = function() {
this.scene = “final”;
stopMusic();
sfxFanfare();
var self = this;
setTimeout(function(){ sfxCheer(); }, 700);
setTimeout(function(){ sfxCheer(); }, 1400);
this.broadcast({type:“final”});
render();
};

HostGame.prototype.reset = function() {
if (this.timer) clearInterval(this.timer);
stopMusic();
location.reload();
};

// CLIENT (PHONE)
// ============================================================
function ClientGame(code) {
this.code = code.toUpperCase();
this.peer = null;
this.conn = null;
this.scene = “connecting”;
this.name = “”;
this.character = null;
this.takenChars = [];
this.players = {};
this.error = null;
this.currentQ = null;
this.isAnswerer = false;
this.answerSent = false;
this.voteSent = false;
this.voteOptions = [];
this.canVote = false;
this.subjectName = null;
}

ClientGame.prototype.init = function() {
var self = this;
this.peer = new Peer({
config: {iceServers:[
{urls:“stun:stun.l.google.com:19302”},
{urls:“stun:stun1.l.google.com:19302”}
]}
});
this.peer.on(“open”, function() {
self.conn = self.peer.connect(self.code);
self.conn.on(“open”, function(){ self.scene = “pickChar”; render(); });
self.conn.on(“data”, function(d){ self.onMsg(d); });
self.conn.on(“close”, function(){ self.error = “Connection lost. Try refreshing.”; render(); });
self.conn.on(“error”, function(){ self.error = “Connection issue. Try again.”; render(); });
});
this.peer.on(“error”, function(err) {
self.error = err.type === “peer-unavailable” ? “Room not found! Double check the code.” : “Could not connect. Try again.”;
self.scene = “pickChar”;
render();
});
};

ClientGame.prototype.onMsg = function(d) {
if (!d || !d.type) return;
if (d.type === “players” || d.type === “state”) {
this.players = d.players || {};
this.takenChars = Object.values(this.players).filter(function(p){ return p.connected; }).map(function(p){ return p.character; });
render();
}
if (d.type === “joined”) { this.scene = “waiting”; render(); }
if (d.type === “joinError”) { this.error = d.reason; this.scene = “pickChar”; render(); }
if (d.type === “roundStart”) {
this.currentQ = d; this.isAnswerer = d.isAnswerer;
this.answerSent = false; this.voteSent = false;
this.subjectName = d.subjectName;
this.scene = “answer”; render();
}
if (d.type === “answerOk”) { this.answerSent = true; this.scene = “waiting”; render(); }
if (d.type === “votePhase”) {
this.voteOptions = d.options || []; this.canVote = d.canVote;
this.currentQ = d; this.voteSent = false;
this.scene = “vote”; render();
}
if (d.type === “voteOk”) { this.voteSent = true; this.scene = “waiting”; render(); }
if (d.type === “watching”) { this.scene = “watching”; render(); }
if (d.type === “leaderboard”) { this.scene = “watching”; render(); }
if (d.type === “final”) { this.scene = “drumroll”; render(); }
};

ClientGame.prototype.join = function(name, character) {
this.error = null;
this.name = name;
this.character = character;
this.conn.send({type:“join”, name:name, character:character});
};

ClientGame.prototype.sendAnswer = function(ans) {
if (this.answerSent) return;
this.conn.send({type:“answer”, answer:ans});
};

ClientGame.prototype.sendVote = function(idx) {
if (this.voteSent) return;
this.conn.send({type:“vote”, idx:idx});
};

‘<div class="rtp" style="background:var(--pu-bg);color:var(--pu-d);border:2px solid var(--pu)">Vote on your phone!</div>’,
‘<span class="pill pl-pk">Round ’ + (HOST.roundIdx+1) + ‘</span>’,
‘</div>’,
‘<div class="card-sm mb16" style="background:rgba(61,44,78,.04);text-align:center;font-style:italic;font-size:18px;color:var(--mu);font-weight:700;font-family:var(--fb)">”’ + r.question + ‘”</div>’,
‘<div class="col g8 mb16">’ + cards + ‘</div>’,
‘<div class="row btw vc">’,
‘<p class="sub">’ + voted + ’ of ’ + totalV + ’ voted</p>’,
‘<div style="font-size:36px;font-weight:700;color:var(--ye-d);font-family:var(--fb)">’ + HOST.timeLeft + ‘s</div>’,
‘</div>’,
‘<div class="row g8 mt16 hc">’,
‘<button class="btn btn-ghost" id="pauseBtn" style="font-size:14px">’ + (HOST.paused ? ‘Resume’ : ‘Pause’) + ‘</button>’,
‘<button class="btn btn-pu" id="skipBtn" style="font-size:14px">End voting</button>’,
‘</div>’,
‘</div></div></div>’
].join(””);

$(“pauseBtn”).onclick = function() { HOST.pauseToggle(); };
$(“skipBtn”).onclick = function() { HOST.endVote(); };
}

function renderHostReveal() {
var max = Math.max(1, Math.max.apply(null, HOST.shuffledAnswers.map(function(a){ return a.votes||0; })));
var allDone = HOST.revealIdx >= HOST.shuffledAnswers.length;

var rows = HOST.shuffledAnswers.map(function(a, i) {
var revealed = i < HOST.revealIdx;
if (!revealed) {
return ‘<div class="rv" style="background:rgba(61,44,78,.05);border:2px solid rgba(61,44,78,.08)"><div class="rv-in"><div class="rv-txt" style="color:rgba(61,44,78,.5)">’ + a.text + ‘</div><div class="rv-pts" style="color:var(--mu)">?</div></div></div>’;
}
var p = HOST.players[a.playerId];
if (!p) return “”;
var c = CHARS[p.character];
var pct = Math.round(((a.votes||0)/max)*100);
var isW = a.votes === max && a.votes > 0;
return ‘<div class="rv popin" style="background:' + c.bg + ';border:2px solid ' + c.col + '44"><div class="rv-bar" style="width:' + pct + '%;background:' + c.col + '"></div><div class="rv-in">’ + charIcon(p,36) + ‘<div style="flex:1"><div class="rv-txt">’ + a.text + ‘</div><div style="font-size:13px;color:' + c.col + ';font-weight:800;margin-top:3px">’ + p.name + ’ - ’ + (a.votes||0) + ’ vote’ + ((a.votes||0)!==1?‘s’:’’) + ‘</div></div><div class="rv-pts" style="color:' + c.col + '">’ + ((a.points||0)>0?’+’+a.points:’–’) + (isW?’ <div style="font-size:11px">WINS</div>’:’’) + ‘</div></div></div>’;
}).join(””);

root().innerHTML = [
‘<div class="screen"><div class="w">’,
‘<div class="card fu">’,
‘<div class="tc mb16"><div style="font-size:44px;margin-bottom:8px">👀</div><h2 class="t2 mb8">The Reveal!</h2><p class="sub" style="font-style:italic">”’ + HOST.currentRound.question + ‘”</p></div>’,
‘<div class="col g8 mb20">’ + rows + ‘</div>’,
‘<div class="tc">’,
!allDone
? ‘<button class="btn btn-pu btn-full" id="rvBtn">Reveal Next (’ + (HOST.revealIdx+1) + ‘/’ + HOST.shuffledAnswers.length + ‘) 👀</button>’
: ‘<button class="btn btn-pk btn-full" id="lbBtn">See Leaderboard</button>’,
‘</div>’,
‘</div></div></div>’
].join(””);

if (!allDone) $(“rvBtn”).onclick = function() { HOST.nextReveal(); };
else $(“lbBtn”).onclick = function() { HOST.goLeaderboard(); };
}

function renderHostLeaderboard() {
var sorted = Object.values(HOST.players).sort(function(a,b){ return b.score-a.score; });
var max = Math.max(1, sorted[0] ? sorted[0].score : 1);
var isLast = HOST.roundIdx >= HOST.roundOrder.length - 1;

var rows = sorted.map(function(p, i) {
var c = CHARS[p.character];
var pct = Math.round((p.score/max)*100);
var isFirst = i===0;
return ‘<div class="lb-row popin" style="background:' + (isFirst?c.bg:'transparent') + ';border:2px solid ' + (isFirst?c.col+'44':'transparent') + ';animation-delay:' + (i*.1) + 's"><div class="lb-rk" style="color:' + (isFirst?'#FFAA00':'rgba(61,44,78,.25)') + ';font-size:' + (isFirst?22:18) + 'px">’ + (i===0?‘👑’:i+1) + ‘</div>’ + charIcon(p,40) + ‘<div class="lb-nm" style="color:' + (isFirst?c.col:'var(--tx)') + '">’ + p.name + ‘</div><div class="lb-bw"><div class="lb-bf" style="width:' + pct + '%;background:' + c.col + '"></div></div><div class="lb-sc" style="color:' + c.col + '">’ + p.score.toLocaleString() + ‘</div></div>’;
}).join(””);

root().innerHTML = [
‘<div class="screen"><div class="w">’,
‘<div class="card fu">’,
’<div class="tc mb20"><div style="font-size:52px;margin-bottom:8px">🏆</div><h2 class="t2 mb8">Leaderboard</h2><p class="sub">After Round ’ + (HOST.roundIdx+1) + ‘</p></div>’,
‘<div class="mb20">’ + rows + ‘</div>’,
‘<button class="btn btn-pk btn-full" id="nxtBtn">’ + (isLast ? ‘See Final Results ✨’ : ‘Next Round →’) + ‘</button>’,
‘</div></div></div>’
].join(””);

$(“nxtBtn”).onclick = function() { HOST.nextRound(); };
}

function renderHostFinal() {
var sorted = Object.values(HOST.players).sort(function(a,b){ return b.score-a.score; });
var top3 = sorted.slice(0,3);
var rest = sorted.slice(3);

function podPerson(p, place) {
if (!p) return ‘<div class="pod-col"><div style="height:80px"></div><div></div><div></div><div class="pod-box pod-' + place + '">’ + place + ‘</div></div>’;
var c = CHARS[p.character];
return ‘<div class="pod-col"><div style="background:' + c.bg + ';border:3px solid ' + c.col + ';border-radius:20px;padding:12px;width:92px;height:92px;display:flex;align-items:center;justify-content:center;font-size:50px">’ + c.emoji + ‘</div><div style="font-size:17px;font-weight:700;color:' + c.col + ';text-align:center">’ + p.name + ‘</div><div style="font-size:13px;font-weight:800;color:var(--ye-d);font-family:var(--fb)">’ + p.score.toLocaleString() + ’ pts</div><div class="pod-box pod-' + place + '">’ + place + ‘</div></div>’;
}

var restRows = rest.map(function(p,i) {
var c = CHARS[p.character];
return ‘<div class=“lb-row fu””><div class="lb-rk" style="color:rgba(61,44,78,.3)">’ + (i+4) + ‘</div>’ + charIcon(p,36) + ‘<div class="lb-nm">’ + p.name + ‘</div><div class="lb-sc" style="color:' + c.col + '">’ + p.score.toLocaleString() + ‘</div></div>’;
}).join(””);

root().innerHTML = [
‘<div class="screen"><div class="w">’,
‘<div class="card fu">’,
‘<div class="tc mb16"><div style="font-size:60px;margin-bottom:8px">✨🏆✨</div><h1 class="t1 mb8">Game Over!</h1><p class="sub">Tonight's results are in</p></div>’,
‘<div class="podium">’ + podPerson(top3[1],2) + podPerson(top3[0],1) + podPerson(top3[2],3) + ‘</div>’,
rest.length ? ‘<hr><div class="lbl tc mb8">Also slaying tonight</div>’ + restRows : ‘’,
‘<hr><div class="row g8 hc wrap">’,
‘<button class="btn btn-pk" id="sameBtn">Same Players - Play Again</button>’,
‘<button class="btn btn-ghost" id="newBtn">New Game</button>’,
‘</div>’,
‘</div></div></div>’
].join(””);

$(“sameBtn”).onclick = function() {
Object.values(HOST.players).forEach(function(p){ p.score=0; });
HOST.roundIdx=0; HOST.lieRoster=shuffle(Object.keys(HOST.players));
HOST.roundOrder=makeRoundOrder(); HOST.usedQs={};
startMusic(); HOST.startRound();
};
$(“newBtn”).onclick = function() { HOST.reset(); };
}

// –– PHONE SCENES ––
function renderPhone() {
if (!CLIENT) return renderPhoneCode();
if (CLIENT.scene === “connecting”) return renderPhoneConnecting();
if (CLIENT.scene === “pickChar”) return renderPhonePickChar();
if (CLIENT.scene === “waiting”) return renderPhoneWaiting();
if (CLIENT.scene === “answer”) return renderPhoneAnswer();
if (CLIENT.scene === “vote”) return renderPhoneVote();
if (CLIENT.scene === “watching”) return renderPhoneWatching();
if (CLIENT.scene === “drumroll”) return renderPhoneDrumroll();
}

function renderPhoneCode() {
var params = new URLSearchParams(window.location.search);
var auto = params.get(“join”) || “”;
root().innerHTML = [
‘<div class="screen"><div class="w-sm">’,
‘<div class="card fu">’,
‘<div class="tc mb20"><div style="font-size:44px;margin-bottom:8px">📱</div><h2 class="t2 mb8">Join the Game</h2><p class="sub">Enter the code shown on the TV</p></div>’,
‘<div class="lbl">Room Code</div>’,
‘<input class="inp tc" id="codeInp" placeholder="Enter code..." value="' + auto + '" maxlength="8" style="font-size:28px;letter-spacing:6px;text-transform:uppercase;font-family:var(--fb);font-weight:700">’,
‘<button class="btn btn-pk btn-full mt16" id="goBtn">Connect</button>’,
‘<button class="btn btn-ghost btn-full mt8" id="backBtn">Back</button>’,
‘</div></div></div>’
].join(””);

$(“codeInp”).oninput = function(e){ e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,””); };
$(“codeInp”).onkeydown = function(e){ if(e.key===“Enter”) $(“goBtn”).click(); };
$(“goBtn”).onclick = function() {
var code = $(“codeInp”).value.trim().toUpperCase();
if (code.length < 4) return;
CLIENT = new ClientGame(code);
CLIENT.init();
render();
};
$(“backBtn”).onclick = function() { MODE=null; render(); };
if (auto) { setTimeout(function(){ $(“goBtn”) && $(“goBtn”).click(); }, 200); }
}

function renderPhoneConnecting() {
root().innerHTML = [
‘<div class="screen"><div class="w-sm">’,
‘<div class="card tc fu">’,
‘<div style="font-size:48px;margin-bottom:12px" class="shim">⏳</div>’,
‘<h2 class="t2 mb8">Connecting…</h2>’,
‘<p class="sub mb16">Joining room <strong>’ + CLIENT.code + ‘</strong></p>’,
CLIENT.error ? ‘<div class="card-sm mb12" style="background:#FFE5E5;border:2px solid #FF8888;color:#CC2222;font-weight:700;font-size:15px;font-family:var(--fb);text-align:center">’ + CLIENT.error + ‘</div>’ : ‘’,
‘<button class="btn btn-ghost btn-full" id="cancelBtn">Cancel</button>’,
‘</div></div></div>’
].join(””);
$(“cancelBtn”).onclick = function() { CLIENT=null; render(); };
}

function renderPhonePickChar() {
var cards = CHAR_IDS.map(function(id) {
var c = CHARS[id];
var taken = CLIENT.takenChars.indexOf(id) >= 0;
var sel = CLIENT.character === id;
return ‘<div class="ccard ' + (sel?'on':'') + ' ' + (taken?'taken':'') + '" data-c="' + id + '"><div class="c-emoji">’ + c.emoji + ‘</div><div class="c-name">’ + c.name + ‘</div><div class="c-vibe">’ + c.vibe + ‘</div></div>’;
}).join(””);

root().innerHTML = [
‘<div class="screen" style="padding:16px"><div class="w-sm">’,
‘<div class="card fu">’,
‘<div class="tc mb16"><div style="font-size:36px">🎀</div><h2 class="t2 mb8">Pick Your Character</h2><p class="sub" style="font-size:14px">Your character for the whole game</p></div>’,
CLIENT.error ? ‘<div class="card-sm mb12" style="background:#FFE5E5;border:2px solid #FF8888;color:#CC2222;font-weight:700;font-size:14px;font-family:var(--fb);text-align:center">’ + CLIENT.error + ‘</div>’ : ‘’,
‘<div class="cgrid">’ + cards + ‘</div>’,
‘<div class="lbl mt16">Your Name</div>’,
‘<input class="inp" id="nameInp" placeholder="Enter your name..." maxlength="20" value="' + (CLIENT.name||'') + '">’,
‘<button class=“btn btn-pk btn-full mt16” id=“joinBtn”’ + (!CLIENT.character?’ disabled’:’’) + ‘>’ + (CLIENT.character?‘Lets Go! ✨’:‘Pick a character first’) + ‘</button>’,
‘</div></div></div>’
].join(””);

document.querySelectorAll(”[data-c]”).forEach(function(el) {
el.onclick = function() {
var c = el.getAttribute(“data-c”);
if (CLIENT.takenChars.indexOf(c) >= 0) return;
CLIENT.character = c; CLIENT.error = null; render();
};
});
$(“nameInp”).oninput = function(e){ CLIENT.name = e.target.value; };
$(“joinBtn”).onclick = function() {
var n = $(“nameInp”).value.trim();
if (!n || !CLIENT.character) return;
CLIENT.join(n, CLIENT.character);
};
}

function renderPhoneWaiting() {
var c = CLIENT.character ? CHARS[CLIENT.character] : null;
root().innerHTML = [
‘<div class="screen"><div class="w-sm">’,
‘<div class="card tc fu">’,
c ? ‘<div style="background:' + c.bg + ';border-radius:18px;padding:20px;border:2px solid ' + c.col + '33;margin-bottom:16px;display:inline-block"><div style="font-size:64px">’ + c.emoji + ‘</div><div style="font-size:20px;font-weight:700;color:' + c.col + ';margin-top:6px">’ + CLIENT.name + ‘</div></div>’ : ‘’,
‘<div style="font-size:36px;margin-bottom:8px" class="shim">✨</div>’,
‘<h2 class="t2 mb8">’ + (CLIENT.answerSent ? ‘Answer locked in!’ : CLIENT.voteSent ? ‘Vote locked in!’ : ‘Waiting…’) + ‘</h2>’,
‘<p class="sub">’ + ((CLIENT.answerSent || CLIENT.voteSent) ? ‘Watch the TV for the results!’ : ‘The host will start soon’) + ‘</p>’,
‘</div></div></div>’
].join(””);
}

function renderPhoneAnswer() {
var q = CLIENT.currentQ;
var c = CLIENT.character ? CHARS[CLIENT.character] : null;

if (!CLIENT.isAnswerer) {
root().innerHTML = [
‘<div class="screen"><div class="w-sm">’,
‘<div class="card tc fu">’,
‘<div class="ph-q"><div class="ph-qt">’ + q.label + ‘</div><div class="ph-qq">’ + q.question + ‘</div></div>’,
‘<div style="font-size:40px;margin-bottom:8px">🍿</div>’,
‘<p class="sub">You get to vote in a moment!</p>’,
‘</div></div></div>’
].join(””);
return;
}

root().innerHTML = [
‘<div class="screen" style="padding:16px"><div class="w-sm">’,
‘<div class="card fu">’,
c ? ‘<div class="row vc g8 mb12">’ + ‘<div style="width:36px;height:36px;background:' + c.bg + ';border:2px solid ' + c.col + '33;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px">’ + c.emoji + ‘</div>’ + ‘<div style="font-size:16px;font-weight:700;color:' + c.col + '">’ + CLIENT.name + ‘</div></div>’ : ‘’,
‘<div class="ph-q"><div class="ph-qt">’ + q.label + ‘</div><div class="ph-qq">’ + q.question + ‘</div></div>’,
‘<textarea class=“txta” id=“ansInp” placeholder=”’ + (q.roundType===‘lie’?‘2 truths and 1 lie - one per line!’:‘Type your answer…’) + ‘” maxlength=“200”’ + (q.roundType===‘lie’?’ style=“min-height:130px”’:’’) + ‘></textarea>’,
‘<button class="btn btn-pk btn-full mt12" id="subBtn">Lock It In ✨</button>’,
‘</div></div></div>’
].join(””);

$(“ansInp”).focus();
$(“subBtn”).onclick = function() {
var a = $(“ansInp”).value.trim();
if (!a) return;
sfxAnswer();
CLIENT.sendAnswer(a);
};
}

function renderPhoneVote() {
if (!CLIENT.canVote) {
root().innerHTML = ‘<div class="screen"><div class="w-sm"><div class="card tc fu"><div style="font-size:40px;margin-bottom:8px">🍿</div><h2 class="t2 mb8">Watching this one!</h2><p class="sub">Check out the TV for the action</p></div></div></div>’;
return;
}

var cards = CLIENT.voteOptions.map(function(opt, i) {
var own = opt.isOwn;
return ‘<div class="ac ' + (own?'ac-off':'') + '" data-v="' + (own?'':opt.i) + '"><div class="ac-n">’ + (i+1) + ‘</div><div style="flex:1">’ + opt.text + ‘</div>’ + (own?’<div style="font-size:11px;color:var(--mu);font-family:var(--fb)">yours</div>’:’’) + ‘</div>’;
}).join(””);

root().innerHTML = [
‘<div class="screen" style="padding:16px"><div class="w-sm">’,
‘<div class="card fu">’,
‘<div class="ph-q"><div class="ph-qt">Vote for the best!</div><div class="ph-qq" style="font-style:italic">”’ + (CLIENT.currentQ ? CLIENT.currentQ.question : ‘’) + ‘”</div></div>’,
‘<div class="lbl tc">Tap the funniest answer</div>’,
‘<div class="col g8">’ + cards + ‘</div>’,
‘</div></div></div>’
].join(””);

document.querySelectorAll(”[data-v]”).forEach(function(el) {
if (!el.getAttribute(“data-v”)) return;
el.onclick = function() {
sfxVote();
CLIENT.sendVote(parseInt(el.getAttribute(“data-v”)));
};
});
}

function renderPhoneWatching() {
var c = CLIENT.character ? CHARS[CLIENT.character] : null;
root().innerHTML = [
‘<div class="screen"><div class="w-sm">’,
‘<div class="card tc fu">’,
c ? ‘<div style="font-size:72px;margin-bottom:8px">’ + c.emoji + ‘</div>’ : ‘<div style="font-size:48px;margin-bottom:8px">📺</div>’,
‘<h2 class="t2 mb8">Watch the TV!</h2>’,
‘<p class="sub">Results are being revealed…</p>’,
‘</div></div></div>’
].join(””);
}

function renderPhoneDrumroll() {
root().innerHTML = [
‘<div class="screen"><div class="w-sm">’,
‘<div class="card tc fu">’,
‘<div style="font-size:72px;margin-bottom:12px" class="shakeanim">🥁</div>’,
‘<h1 class="t1 mb12">DRUMROLL…</h1>’,
‘<p class="sub mb20">The winner is being revealed on the TV right now!</p>’,
‘<div style="font-size:40px">✨💅✨</div>’,
‘</div></div></div>’
].join(””);
}

// ============================================================
// INIT
// ============================================================
document.addEventListener(“click”, function(){ try{ getAC(); }catch(e){} }, {once:true});

window.addEventListener(“load”, function() {
var params = new URLSearchParams(window.location.search);
if (params.get(“join”)) { MODE = “phone”; }
render();
});

render();
</script>

</body>
</html>
